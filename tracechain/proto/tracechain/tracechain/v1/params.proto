syntax = "proto3";
package tracechain.tracechain.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "tracechain/x/tracechain/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "tracechain/x/tracechain/Params";
  option (gogoproto.equal) = true;
  
}